<svg xmlns="http://www.w3.org/2000/svg" width="420" height="90" viewBox="0 0 420 90">
  <defs>
    <linearGradient id="logoShieldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1c2a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#06060c" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="logoGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Shield with padlock -->
  <g transform="translate(40, 38)" filter="url(#logoGlow)">
    <!-- Shield outline -->
    <path d="
      M 0 -28
      C 11 -31, 24 -29, 30 -25
      L 30 -7
      C 30 8, 24 24, 13 35
      C 5 43, 2 45, 0 47
      C -2 45, -5 43, -13 35
      C -24 24, -30 8, -30 -7
      L -30 -25
      C -24 -29, -11 -31, 0 -28
      Z
    " fill="url(#logoShieldFill)" stroke="#00d4ff" stroke-width="2.2" stroke-linejoin="round"/>

    <!-- Padlock shackle -->
    <path d="M -7 -5 C -7 -14, -7 -19, 0 -19 C 7 -19, 7 -14, 7 -5"
          fill="none" stroke="#00d4ff" stroke-width="3" stroke-linecap="round"/>

    <!-- Padlock body -->
    <rect x="-10" y="-6" width="20" height="15" rx="3" fill="#00d4ff"/>

    <!-- Keyhole -->
    <circle cx="0" cy="0" r="2.5" fill="#06060c"/>
    <rect x="-1" y="2" width="2" height="5" rx="0.8" fill="#06060c"/>
  </g>

  <!-- Text: Yubi -->
  <text x="88" y="52" font-family="'DejaVu Sans', 'Segoe UI', Roboto, Arial, sans-serif" font-weight="bold" font-size="34" fill="#00d4ff">Yubi</text>

  <!-- Text: AppGate -->
  <text x="175" y="52" font-family="'DejaVu Sans', 'Segoe UI', Roboto, Arial, sans-serif" font-weight="bold" font-size="34" fill="#e6e6ee">AppGate</text>
</svg>
